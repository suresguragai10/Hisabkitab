<!DOCTYPE html>
<html lang="ne">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HisabKitab — हिसाबकिताब</title>
    <meta name="description" content="नेपाली व्यवसायका लागि क्लाउड अकाउन्टिङ। Cloud accounting for Nepali business." />
    <meta name="theme-color" content="#15543f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HisabKitab" />
    <link rel="manifest" href="manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Authentication must always use the live network. Remove every worker
      // and HisabKitab cache left by earlier PWA builds, regardless of the
      // repository/custom-domain path used for deployment.
      window.addEventListener('load', async () => {
        try {
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }

          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(
              keys
                .filter((key) => key.toLowerCase().includes('hisabkitab'))
                .map((key) => caches.delete(key))
            );
          }
        } catch (error) {
          console.warn('Offline cache cleanup failed:', error);
        }
      });
    </script>
  </body>
</html>
