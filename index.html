const PREFIX = "hisabkitab:";

    } catch (e) {
      return Promise.resolve(null);
    }
  },
  set(k, v) {

      return Promise.resolve(null);
    }
  },
  delete(k) {
    try {
      localStorage.removeItem(PREFIX + k);
      return Promise.resolve({
        key: k,

        key: k,
        deleted: false

function adToBs(adStr) {

  let bm = 0;
  while (days >= BS_DATA[by][bm]) {
    days -= BS_DATA[by][bm];
    bm++;

function inWords(n) {
  n = Math.round((Number(n) || 0) * 100) / 100;

    paisa = Math.round((n - rupees) * 100);
  const ones = ["", "One", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine", "Ten", "Eleven", "Twelve", "Thirteen", "Fourteen", "Fifteen", "Sixteen", "Seventeen", "Eighteen", "Nineteen"];
  const tens = ["", "", "Twenty", "Thirty", "Forty", "Fifty", "Sixty", "Seventy", "Eighty", "Ninety"];
  const two = x => x < 20 ? ones[x] : tens[Math.floor(x / 10)] + (x % 10 ? " " + ones[x % 10] : "");
  const three = x => x >= 100 ? ones[Math.floor(x / 100)] + " Hundred" + (x % 100 ? " " + two(x % 100) : "") : two(x);
  function conv(x) {
    if (x === 0) return "Zero";
    let s = "";
    const cr = Math.floor(x / 10000000);
    x %= 10000000;
    const la = Math.floor(x / 100000);
    x %= 100000;
    const th = Math.floor(x / 1000);
    x %= 1000;
    const hu = x;
    if (cr) s += conv(cr) + " Crore ";
    if (la) s += two(la) + " Lakh ";
    if (th) s += two(th) + " Thousand ";
    if (hu) s += three(hu);
    return s.trim();
  }
  let w = "Rupees " + conv(rupees);
  if (paisa) w += " and " + two(paisa) + " Paisa";
  return w + " only";
}

}
